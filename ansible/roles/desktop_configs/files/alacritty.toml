[general]
# theme
import = ["~/.config/alacritty/themes/nord.toml"]

[scrolling]
history = 10000

[font]
normal = { family = "Fira Code", style = "Regular" }
size = 11

[selection]
save_to_clipboard = true

[terminal]
shell = { program = "/usr/bin/tmux", args = ["new"] }
osc52 = "OnlyCopy"

[env]
TERM = "xterm-256color"

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control", action = "Paste" },
]

[mouse]
bindings = [
  { mouse = "Middle", action = "PasteSelection" }
]

[hints]

[[hints.enabled]]
regex = "(|https://|http://|file://ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "U", mods = "Control|Shift" }

command = "xdg-open"
