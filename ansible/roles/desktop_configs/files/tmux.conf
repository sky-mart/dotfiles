# default prefix
bind-key C-b send-prefix

# better split shortcuts
bind h split-window -h
bind v split-window -v
unbind '"'
unbind %
bind -n C-F6 split-window -h
bind -n C-F5 split-window -v

# window and pane number from 1
set -g base-index 1
setw -g pane-base-index 1

# use mouse
set -g mouse on

# forward inner (e.g. remote) tmux's OSC 52 clipboard sequences out to the terminal
set -g set-clipboard on

# reload config file
bind r source-file ~/.config/tmux/tmux.conf
