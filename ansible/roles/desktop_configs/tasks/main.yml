- name: Install user script
  block:
    - name: Create the user executables directory
      ansible.builtin.file:
        path: ~/.local/bin
        state: directory
        mode: "0755"

    - name: Copy useful scripts
      ansible.builtin.copy:
        src: "{{ item }}.sh"
        dest: "~/.local/bin/{{ item }}.sh"
        mode: 0755
      loop:
        - blconnect
        - kb-layout
  when: (home_pc | default(false)) == true

- name: Install basic packages
  ansible.builtin.apt:
    pkg:
    - fonts-firacode
    - tmux
    - vim
    - alacritty
    update_cache: true
    state: present
  become: true

- name: Create config directories
  ansible.builtin.file:
    path: ~/.config/{{ item }}
    state: directory
  loop:
    - tmux
    - alacritty

- name: Install tmux config
  block:
    - name: Link tmux config locally
      ansible.builtin.file:
        src: "{{ role_path }}/files/tmux.conf"
        path: "{{ ansible_env.HOME }}/.config/tmux/tmux.conf"
        state: link
        force: true
      when: (ansible_connection | default("ssh")) == "local"

    - name: Copy tmux config remotely
      ansible.builtin.copy:
        src: tmux.conf
        dest: ~/.config/tmux/tmux.conf
      when: (ansible_connection | default('ssh')) != "local"

- name: Install alacritty config
  block:
    - name: Link alacritty config locally
      ansible.builtin.file:
        src: "{{ role_path }}/files/alacritty.toml"
        path: "{{ ansible_env.HOME }}/.config/alacritty/alacritty.toml"
        state: link
        force: true
      when: (ansible_connection | default("ssh")) == "local"

    - name: Copy alacritty config remotely
      ansible.builtin.copy:
        src: alacritty.toml
        dest: ~/.config/alacritty/alacritty.toml
      when: (ansible_connection | default('ssh')) != "local"

- name: Install KDE shortcuts
  ansible.builtin.copy:
    src: kglobalshortcutsrc
    dest: ~/.config/kglobalshortcutsrc
