- name: Create the user executables directory
  ansible.builtin.file:
    path: ~/.local/bin
    state: directory
    mode: "0755"
  when: (home_pc | default(false)) == true

# TODO: install xkb-switch

- name: Link useful scripts
  ansible.builtin.file:
    src: "{{ item }}.sh"
    path: "~/.local/bin/{{ item }}.sh"
    state: link
    force: true
  loop:
    - blconnect
    - kb-layout
  when:
    - (ansible_connection | default("ssh")) == "local"
    - (home_pc | default(false)) == true

- name: Copy useful scripts
  ansible.builtin.copy:
    src: "{{ item }}.sh"
    dest: "~/.local/bin/{{ item }}.sh"
  loop:
    - blconnect
    - kb-layout
  when:
    - (ansible_connection | default("ssh")) != "local"
    - (home_pc | default(false)) == true
