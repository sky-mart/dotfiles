- name: Install zsh and its deps
  ansible.builtin.apt:
    pkg:
    - fonts-powerline
    - git
    - zoxide
    - zsh
    - zsh-syntax-highlighting
    - python3
    - python3-pexpect
    update_cache: true
    state: present
  become: true

- name: Install oh my zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: ~/.oh-my-zsh
    depth: 1
    version: e50dd3417c8b9e072593b6c14473e1360bd88b02

- name: Install zsh config
  block:
    - name: Link zsh config locally
      ansible.builtin.file:
        src: "{{ role_path }}/files/.zshrc"
        path: "{{ ansible_env.HOME }}/.zshrc"
        state: link
        force: true
      when: (ansible_connection | default("ssh")) == "local"

    - name: Copy zsh config remotely
      ansible.builtin.copy:
        src: .zshrc
        dest: ~/.zshrc
      when: (ansible_connection | default('ssh')) != "local"

- name: Install zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions
    depth: 1
    version: 39aa7bed3a477af1eaa3aa72bcb6e6e616aa7dc0

- name: Install zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
    depth: 1
    version: 0.8.0

- name: Clone fzf repo
  ansible.builtin.git:
    repo: "https://github.com/junegunn/fzf.git"
    dest: ~/.fzf
    depth: 1

- name: Run interactive fzf installer
  ansible.builtin.expect:
    command: "{{ ansible_env.HOME }}/.fzf/install"
    responses:
      "enable fuzzy auto-completion": "y"
      "enable key bindings": "y"
      "update your shell configuration files": "n"
    timeout: 300

- name: Install fzf-zsh-plugin plugin
  ansible.builtin.git:
    repo: https://github.com/unixorn/fzf-zsh-plugin.git
    dest: ~/.oh-my-zsh/custom/plugins/fzf-zsh-plugin
    depth: 1
    version: 8343e80065e510c2033d16f93472c3ae86be6fe4

- name: Set the shell for a user
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    shell: /usr/bin/zsh
  become: true
